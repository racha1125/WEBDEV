<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tables</title>
    <style>
      table {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- Table -->
    <table border="2px">
      <caption>
        STUDENT DATA
      </caption>
      <thead>
        <tr>
          <th>NAME</th>
          <th>ROLLNO</th>
          <th>BRANCH</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Akshay</td>
          <td>42</td>
          <td>CSE</td>
        </tr>
        <tr>
          <td>Ajay</td>
          <td>50</td>
          <td>IT</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
