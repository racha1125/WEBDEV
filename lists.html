<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LISTS</title>
  </head>
  <body>
    <!-- Unordered List -->
    <ul>
      <li>Apple</li>
      <li>Orange</li>
      <ol>
        <li>Color:orange</li>
        <li>Taste:Sweet</li>
      </ol>
      <li>Banana</li>
    </ul>
    <ol>
      <li>Bowl</li>
      <li>Rice</li>
      <ul>
        <li>White</li>
        <li>Brown</li>
        <li>Long</li>
      </ul>
      <li>Water</li>
      <li>Flame</li>
    </ol>
  </body>
</html>
